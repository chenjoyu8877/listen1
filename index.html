<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日文單字翻卡測驗 - 精簡版</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .header-container {
            background-color: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            text-align: center;
            margin-bottom: 12px;
            box-sizing: border-box;
        }
        
        h1 { font-size: 18px; color: #333; margin: 0 0 5px 0; }
        
        .progress-text {
            font-size: 12px;
            color: #e67e22;
            font-weight: bold;
            margin-bottom: 10px;
            background: #fff3e0;
            display: inline-block;
            padding: 2px 10px;
            border-radius: 15px;
        }

        .mode-selector { 
            text-align: left; 
            background: #eef2f5; 
            padding: 8px 12px; 
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 12px;
        }
        .mode-selector label { 
            display: flex;
            align-items: center;
            cursor: pointer; 
            font-weight: bold; 
            color: #2c3e50; 
            font-size: 14px;
        }
        .mode-selector input[type="radio"] {
            transform: scale(1.1);
            margin-right: 8px;
        }
        
        .action-buttons {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        button {
            flex: 1; 
            color: white; border: none;
            padding: 12px 5px; font-size: 15px; border-radius: 8px;
            cursor: pointer; transition: transform 0.1s, background 0.3s; font-weight: bold;
            box-shadow: 0 3px 5px rgba(0, 0, 0, 0.1);
        }
        button:active { transform: translateY(2px); }
        
        .btn-primary { background-color: #3498db; }
        .btn-secondary { background-color: #9b59b6; }

        .hint-text {
            color: #7f8c8d;
            font-size: 12px;
            margin-bottom: 10px;
            text-align: center;
        }

        .cards-list {
            display: flex;
            flex-direction: column;
            gap: 10px; /* 卡片間距縮小 */
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
            padding-bottom: 30px;
        }

        /* 字卡縮小核心設定 */
        .card {
            perspective: 1000px;
            height: 60px; /* 高度縮小 */
            width: 100%;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .card-inner {
            width: 100%;
            height: 100%;
            transition: transform 0.4s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            position: relative;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
        }
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px; /* 字體微調 */
            font-weight: bold;
            border-radius: 8px;
            padding: 5px;
            box-sizing: border-box;
            text-align: center;
            letter-spacing: 1px;
        }
        .card-front {
            background-color: #fff;
            color: #2c3e50;
            border: 1.5px solid #e0e6ed;
        }
        .card-back {
            background-color: #27ae60;
            color: white;
            transform: rotateY(180deg);
            border: 1.5px solid #2ecc71;
        }
    </style>
</head>
<body>

<div class="header-container">
    <h1>📝 日文單字測驗</h1>
    <div id="progressDisplay" class="progress-text">剩餘題目: 35 / 35</div>
    
    <div class="mode-selector">
        <label><input type="radio" name="mode" value="1" checked> 顯示漢字，翻開假名</label>
        <label><input type="radio" name="mode" value="2"> 顯示假名，翻開漢字</label>
        <label><input type="radio" name="mode" value="3"> 混合題型 (隨機)</label>
    </div>

    <div class="action-buttons">
        <button onclick="drawNewBatch()" class="btn-primary">🎲 抽下一組</button>
        <button onclick="toggleAllCards()" id="toggleAllBtn" class="btn-secondary">🔼 全部翻開</button>
    </div>
</div>

<div class="hint-text">💡 點擊卡片翻面，或點上方按鈕全翻</div>

<div class="cards-list" id="cardsContainer"></div>

<script>
    const vocabData = [
        { kanji: "通年", kana: "つう.ねん" },
        { kanji: "選択科目", kana: "せん.たく.か.もく" },
        { kanji: "生活", kana: "せい.かつ" },
        { kanji: "仕方", kana: "し.かた" },
        { kanji: "出席", kana: "しゅっ.せき" },
        { kanji: "表現", kana: "ひょう.げん" },
        { kanji: "必修", kana: "ひっ.しゅう" },
        { kanji: "科目", kana: "か.もく" },
        { kanji: "作成", kana: "さく.せい" },
        { kanji: "履修", kana: "り.しゅう" },
        { kanji: "欠席", kana: "けっ.せき" },
        { kanji: "授業", kana: "じゅ.ぎょう" },
        { kanji: "單位", kana: "たん.い" },
        { kanji: "圖書館", kana: "と.しょ.かん" },
        { kanji: "利用", kana: "り.よう" },
        { kanji: "登錄", kana: "とう.ろく" },
        { kanji: "健康診斷", kana: "けん.こう.しん.だん" },
        { kanji: "獎學金", kana: "しょう.加味.きん" },
        { kanji: "事務所", kana: "じ.む.しょ" },
        { kanji: "健康保險", kana: "けん.こう.ほ.けん" },
        { kanji: "定員", kana: "てい.いん" },
        { kanji: "交流", kana: "こう.りゅう" }, 
        { kanji: "行事", kana: "ぎょう.じ" },
        { kanji: "揭示板", kana: "けい.じ.ばん" },
        { kanji: "休講", kana: "きゅう.こう" },
        { kanji: "實習", kana: "じっ.しゅう" },
        { kanji: "實際", kana: "じっ.さい" },
        { kanji: "卒論", kana: "そつ.ろん" },
        { kanji: "指導", kana: "し.どう" },
        { kanji: "合宿", kana: "がっ.しゅく" },
        { kanji: "応募", kana: "おう.ぼ" },
        { kanji: "預算", kana: "よ.さん" },
        { kanji: "大事", kana: "だい.じ" },
        { kanji: "就職活動", kana: "しゅう.しょく.かつ.どう" },
        { kanji: "歡迎", kana: "かん.げい" }
    ];

    let remainingVocab = []; 
    let currentBatch = [];   
    let isAllFlipped = false;

    function shuffleArray(array) {
        let newArray = [...array];
        for (let i = newArray.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
        }
        return newArray;
    }

    function initPool() {
        remainingVocab = shuffleArray([...vocabData]);
        updateProgress();
        drawNewBatch();
    }

    function updateProgress() {
        const display = document.getElementById('progressDisplay');
        display.innerText = `池內剩餘題目: ${remainingVocab.length} / ${vocabData.length}`;
    }

    function drawNewBatch() {
        if (remainingVocab.length === 0) {
            alert("🎉 恭喜！35 個單字都複習完畢！將為您重新洗牌。");
            remainingVocab = shuffleArray([...vocabData]);
        }
        const drawCount = Math.min(10, remainingVocab.length);
        currentBatch = remainingVocab.splice(0, drawCount);
        updateProgress();
        renderCards();
    }

    function renderCards() {
        const container = document.getElementById('cardsContainer');
        container.innerHTML = ''; 
        isAllFlipped = false;
        document.getElementById('toggleAllBtn').innerText = "🔼 全部翻開";
        const mode = document.querySelector('input[name="mode"]:checked').value;

        currentBatch.forEach(word => {
            let frontText, backText;
            let currentType = mode;
            if (mode === "3") { currentType = Math.random() > 0.5 ? "1" : "2"; }
            let kanaStr = word.kana || "資料錯誤"; 

            if (currentType === "1") {
                frontText = word.kanji;
                backText = kanaStr;
            } else {
                frontText = kanaStr;
                backText = word.kanji;
            }

            const cardDiv = document.createElement('div');
            cardDiv.className = 'card';
            cardDiv.innerHTML = `
                <div class="card-inner">
                    <div class="card-front">${frontText}</div>
                    <div class="card-back">${backText}</div>
                </div>
            `;
            cardDiv.addEventListener('click', function() { this.classList.toggle('flipped'); });
            container.appendChild(cardDiv);
        });
    }

    function toggleAllCards() {
        const cards = document.querySelectorAll('.card');
        isAllFlipped = !isAllFlipped;
        cards.forEach(card => {
            if (isAllFlipped) card.classList.add('flipped');
            else card.classList.remove('flipped');
        });
        document.getElementById('toggleAllBtn').innerText = isAllFlipped ? "🔽 全部蓋回" : "🔼 全部翻開";
    }

    document.querySelectorAll('input[name="mode"]').forEach(radio => {
        radio.addEventListener('change', renderCards);
    });

    window.onload = initPool;
</script>

</body>
</html>
